name: CI

on:
  push:
  pull_request:

# Opt the bundled JS actions into the Node.js 24 runtime ahead of GitHub's
# 2026-06-16 default switch (silences the Node.js 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Least privilege: every job only needs to read the repo. No job writes back
# or publishes, so the default `contents: write` token is unnecessary and a
# vector for credential exfiltration from repo-controlled build steps. Each
# checkout also sets persist-credentials: false so the saved GITHUB_TOKEN is
# not left on the runner for later steps (zizmor: artipacked).
permissions:
  contents: read

jobs:
  rust:
    name: Rust binding (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/rust
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('bindings/rust/Cargo.toml') }}
      - run: cargo build --all-targets
      - run: cargo test

  # Tauri desktop shell (src-tauri). Compiles the Rust core — including the
  # airp_dispatch/airp:envelope bridge — and runs its unit tests. src-tauri
  # depends on bindings/rust (path dep) and on the built frontend (../dist, via
  # tauri.conf.json frontendDist), so we install npm deps and build the UI
  # before cargo. Tauri's build.rs also needs the system WebKit/GTK libs.
  tauri:
    name: Tauri shell (cargo build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tauri system dependencies (WebKit/GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-tauri-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Build frontend (tauri.conf.json frontendDist = ../dist)
        run: |
          npm ci
          npm run build
      - name: Generate app icons (required by tauri.conf.json bundle.icon)
        run: npx tauri icon src-tauri/icon-source.png
      - run: cargo build --manifest-path src-tauri/Cargo.toml --all-targets
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  typescript:
    name: TypeScript binding (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck

  schema:
    name: JSON Schema (validate examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate examples against the protocol schema
        run: >-
          npx --yes ajv-cli@5 validate
          --spec=draft2020
          --strict=false
          -s schema/airp-state-protocol.schema.json
          -d "examples/*.json"
      - name: Validate widget manifests
        run: >-
          npx --yes ajv-cli@5 validate
          --spec=draft2020
          --strict=false
          -s schema/widget-manifest.schema.json
          -r schema/airp-state-protocol.schema.json
          -d "widgets/**/*.json"

  ui:
    name: UI (typecheck + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm test
